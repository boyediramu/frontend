<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>scrolling in markquee</title>
</head>
<body>
    <marquee  style="background-color: aqua;" behavior="scroll" direction="right" scrollamount="50">
        <h1>welcome to my website</h1>
    </marquee>
    <marquee  style="background-color: aqua;" behavior="scroll"direction="left" scrolldelay="50">
        <h1>welcome to my website</h1>
    </marquee>
    <marquee  style="background-color: aqua;" direction="up" loop="50">
        <h1>welcome to my website</h1>
    </marquee>
        <marquee  style="background-color: aqua;" direction="down">
        <h1>welcome to my website</h1>
        </marquee>
        
        <marquee behavior="" direction="">
            <img src="https://th.bing.com/th/id/OIP.LO9HfY3cOKXbSDm-uEL-iwHaEK?w=297&h=180&c=7&r=0&o=7&pid=1.7&rm=3
            " alt="img1">
            
        </marquee>
        <marquee behavior="" direction="">
            <img src="https://th.bing.com/th/id/OIP.QVBY30VqTi-tlYt_BaoGqAHaEo?w=283&h=180&c=7&r=0&o=7&pid=1.7&rm=3
            " alt="img2">
        </marquee>
        <marquee behavior="" direction="">
            <img src="https://th.bing.com/th/id/OIP.1gm9ZgMMKWXwKNYw0GP36gHaEK?w=288&h=180&c=7&r=0&o=7&pid=1.7&rm=3
            " alt="img3">
        </marquee>
        <marquee behavior="" direction="">
            <img src="https://th.bing.com/th/id/OIP.IDq8cZVcGfgwgkR1Bt0RywHaEo?w=281&h=180&c=7&r=0&o=7&pid=1.7&rm=3
            " alt="img4">
        </marquee>

   

</body>
</html>
