<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
<center>
    <h1>Tables</h1>
    <table border="1" cellspacing="0" cellpadding="10" style="height: 300px; width: 500px; text-align: center;">
        <thead style="background-color: rgb(20, 178, 231);">
            <tr>
                <th>Device</th>
                <th>Brand</th>
                <th colspan="2">Specifications</th>
                
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="3">smartphone</td>
                <td rowspan="3">apple</td>
                <td style="background-color: yellow;"><b>model</b></td>
                <td style="background-color: yellow;"><b>storage</b></td>
            </tr>
            <tr>
                <!-- <td></td> -->
                <!-- <td></td> -->
                <td>iphone 12 pro</td>
                <td>256bg</td>
            </tr>
            <tr>
                
            <!-- <td></td> -->
            <!-- <td></td> -->
            <td>iphone SE</td>
            <td>128gb</td>
            </tr>
            <tr>
                <td>laptop</td>
                <td>HP</td>
                <td colspan="2">15.6 display</td>
            </tr>
            <tr>
                <td>Tablet</td>
                <td>Samsung</td>
                <td colspan="2">10.5 display</td>
            </tr>
        </tbody>
    </table>
    </center>
    
    
    

</body>
</html>
