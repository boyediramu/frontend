<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            background-image: url(../../assests/login_bg1.png);
            background-repeat: no-repeat;
            background-size:cover;
            background-position: center;
            
        }
        .container{
            display: flex;
            justify-content: center;
            /* border: 2px solid black; */
            text-align: center;
            /* height: 1000px; */
            
             
        }
        .login{
            width: 500px;
            height: 600px;
            border: 2px solid black;
            border-radius: 10px;
            margin-top: 100px;
            /* padding: 0; */
            display: flex;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        form{
            display: flex;
            flex-direction: column;
            justify-content: center;
        
        
        }
        form label{
            text-align: left;
            margin: 5px;
        }
        form input{
            padding: 10px;
            border: none;
            outline: none;
            border-bottom: 2px solid black;
            background: none;
            width: 250px;
            font-size: 15px;
            
        }
        button{
            padding: 10px;
            margin: 10px;
            background-color: black;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        p{
            margin: 5px;
            padding: 0;
            
        }
        p a{
            text-decoration: none;
            color: black;
        }
       
    </style>
</head>
<body>
    <div class="container">
        <div class="login">
            <form>
            <h1>Login</h1>
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="Enter your email" required><br>
            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="Enter your password" required><br>
            <button type="submit">Login</button>
            <p>New User? <a href="">Register here</p>
            <!-- <a href="">Register</a> -->
        </form>
        </div>
    </div>
</body>
</html>
