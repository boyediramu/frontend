<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipCart</title>
    <style>
        body{
            margin: 0;
            padding: 0;
        }
        .navbar{
            background-color: yellow;
            color: blue;
            padding: 1px 10px 1px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .list{
            /* border: 1px solid; */
            display: flex;
            align-items: center ;
            
            
        }
        .list ul{
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 100px;
            
        }
        .list ul li a{
            text-decoration: none;
            color: blue;
        }
        .register{
            /* border: 1px solid; */
            display: flex;
            align-items: center;
            
        }
        .register  button{
            background-color: green;
            color: white;
            padding: 10px;
            border-radius: 5px;
            border: none;
            width: 100px;
        }
        .register button a{
            text-decoration: none;
            color: white;
        }
        .main{
            background-image: url(../../assests/flipcart_bg.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            width: 100%;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .child h1{
            letter-spacing: 20px;
        }
        .child p{
            text-align: center;
        }
        .child button{
            background-color: green;
            color: white;
            padding: 10px;
            border-radius: 5px;
            border: none;
            width: 100px;
            display: block;
            margin: auto;
        }
        .child button a{
            text-decoration: none;
            color: white;
        }
        .products{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 10px;
        }
        .title{
            text-align: center;
            margin: 20px;
            letter-spacing: 10px;
        }
        .cards{
            width: 300px;
            height: 400px;
            border: 1px solid;
            border-radius: 10px;
        }

        .cards img{
            display: block;
            margin: auto;
            width: 150px;
            height: 200px;
        }
        .cards h2{
            text-align: center;
        }

        
        
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <h1>FlipCart</h1>
            </div>
            <div class="list">
                <ul>
                    <li><a href="">Home</a></li>
                    <li><a href="">About</a></li>
                    <li><a href="">Contact</a></li>
                </ul>
            </div>
            <div class="register">
                <button><a href="">Register</a></button>
            </div>
        </nav>
    </header>
    <div class="main">
        <div class="child">
            <h1>FASHION SALE</h1>
            <P>Up to 70% off on New Arrivals</P>
            <BUtton>Shop Now</BUtton>
        </div>
    </div>
    <h1 class="title">OUR PRODUCTS</h1>
    <div class="products">
        <div class="cards">
            <img src="../../assests/Apple_iPhone_14-removebg-preview.png" alt="iphone" height="200px" width="150px">
            <h2>Apple Iphone 14</h2>
        </div>
        <div class="cards">
            <img src="../../assests/earbuds.jpeg" alt="earbuds" height="400px" width="300px">
        </div>
        <div class="cards">
            <img src="../../assests/watch.jpeg" alt="watch" height="400px" width="300px">
        </div>
    </div>
</body>
</html>
